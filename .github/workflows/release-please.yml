name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  PLUGIN_NAME: marp-extended

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ github.token }}
          release-type: node
          package-name: marp-extended
          config-file: release-please-config.json
          include-v-in-tags: false
          changelog-path: CHANGELOG.md
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  release-plugin:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Sync versions.json
        run: |
          npm run version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json
          git commit -m "chore(release): sync versions.json for ${{ needs.release-please.outputs.tag_name }}" || true
          git push origin main || true
      - name: Build
        run: |
          npm ci
          npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${TAG#v}"
          gh release upload "$TAG" \
            main.js manifest.json styles.css \
            "${{ env.PLUGIN_NAME }}.zip#${{ env.PLUGIN_NAME }}-${VERSION}.zip" \
            --repo "${{ github.repository }}" --clobber
