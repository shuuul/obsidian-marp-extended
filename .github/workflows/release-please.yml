name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  PLUGIN_NAME: marp-extended

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ github.token }}
          release-type: node
          config-file: release-please-config.json
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  release-plugin:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Sync versions.json
        run: |
          npm run version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json
          git commit -m "chore(release): sync versions.json for ${{ needs.release-please.outputs.tag_name }}" || true
          git push origin main || true
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Verify release assets
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css
          if find . -maxdepth 1 -name "*.zip" | grep -q .; then
            echo "Unsupported ZIP release asset found." >&2
            exit 1
          fi
          if grep -E "puppeteer|chromium-bidi" main.js; then
            echo "Bundled browser automation dependency found in main.js." >&2
            exit 1
          fi
          MAIN_JS_BYTES="$(wc -c < main.js | tr -d ' ')"
          echo "main.js bytes: ${MAIN_JS_BYTES}"
          if [ "${MAIN_JS_BYTES}" -gt 5242880 ]; then
            echo "::warning::main.js is larger than 5 MB. This is currently accepted while retaining beautiful-mermaid."
          fi
      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$TAG" \
            main.js manifest.json styles.css \
            --repo "${{ github.repository }}" --clobber
