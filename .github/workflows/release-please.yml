name: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to publish from main, e.g. 0.7.1. Leave empty to run release-please only.
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  PLUGIN_NAME: marp-extended

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

  release-plugin:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validate release tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${{ needs.release-please.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag '$TAG' must match manifest version '$VERSION' exactly." >&2
            exit 1
          fi
      - name: Sync versions.json
        run: |
          npm run version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json
          git commit -m "chore(release): sync versions.json for ${{ needs.release-please.outputs.tag_name }}" || true
          git push origin main || true
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Verify release assets
        run: npm run scan:release
      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$TAG" \
            main.js manifest.json styles.css \
            --repo "${{ github.repository }}" --clobber

  manual-release-plugin:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validate manual release version
        run: |
          TAG="${{ inputs.release_version }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG" != "$PACKAGE_VERSION" ] || [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Manual release '$TAG' must match package.json '$PACKAGE_VERSION' and manifest.json '$MANIFEST_VERSION'." >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release '$TAG' already exists." >&2
            exit 1
          fi
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Verify release assets
        run: npm run scan:release
      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.release_version }}"
          gh release create "$TAG" \
            main.js manifest.json styles.css \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
